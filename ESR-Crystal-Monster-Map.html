<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESR Crystal Drop Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  :root {
    --bg: #0a0806;
    --bg2: #12100d;
    --bg3: #1a1612;
    --border: #3a2e1e;
    --border2: #5a4a2a;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --gold3: #f5e0a0;
    --red: #8b2020;
    --red2: #c0392b;
    --text: #d4c4a0;
    --text2: #a09070;
    --text3: #6a5a40;
    --crystal-0: #4ae0e0;
    --crystal-1: #4ab0e0;
    --crystal-2: #6a60e0;
    --crystal-3: #a050d0;
    --crystal-4: #e050a0;
    --crystal-5: #e06040;
    --crystal-6: #e09030;
    --crystal-7: #c0c030;
    --crystal-8: #60c040;
    --crystal-9: #40c090;
    --crystal-10: #40a0c0;
    --crystal-11: #8080e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(90,60,20,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(60,30,10,0.2) 0%, transparent 50%);
  }

  header {
    border-bottom: 1px solid var(--border2);
    padding: 28px 40px 20px;
    background: linear-gradient(180deg, rgba(30,20,10,0.8) 0%, transparent 100%);
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold2);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(200,160,60,0.4);
    line-height: 1;
  }

  header .subtitle {
    font-size: 0.95rem;
    color: var(--text3);
    font-style: italic;
    padding-bottom: 3px;
  }

  .main-layout {
    display: flex;
    height: calc(100vh - 80px);
  }

  /* === SIDEBAR === */
  .sidebar {
    width: 300px;
    min-width: 300px;
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    background: var(--bg2);
  }

  .file-zone {
    border: 1px dashed var(--border2);
    border-radius: 4px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .file-zone:hover, .file-zone.drag-over {
    border-color: var(--gold);
    background: rgba(200,160,60,0.05);
  }
  .file-zone.loaded {
    border-style: solid;
    border-color: var(--gold);
    background: rgba(200,160,60,0.06);
  }
  .file-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .file-zone .fz-icon {
    font-size: 1.4rem;
    margin-bottom: 6px;
  }
  .file-zone .fz-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .file-zone .fz-status {
    font-size: 0.8rem;
    color: var(--text3);
    margin-top: 4px;
    font-style: italic;
  }
  .file-zone.loaded .fz-status { color: #70b070; }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  .search-box {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 8px 12px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--text3); font-style: italic; }

  .filter-tabs {
    display: flex;
    gap: 4px;
  }
  .filter-tab {
    flex: 1;
    padding: 5px 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text3);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    text-align: center;
  }
  .filter-tab:hover { border-color: var(--border2); color: var(--text2); }
  .filter-tab.active { background: rgba(200,160,60,0.15); border-color: var(--gold); color: var(--gold); }

  /* Crystal legend */
  .crystal-legend {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .crystal-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .crystal-legend-item:hover { background: rgba(255,255,255,0.04); }
  .crystal-legend-item.filtered { opacity: 0.35; }
  .crystal-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .crystal-name {
    font-size: 0.85rem;
    color: var(--text2);
  }
  .crystal-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--text3);
  }

  /* === MAIN CONTENT === */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    text-align: center;
  }
  .welcome h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold);
    font-weight: 600;
  }
  .welcome p {
    color: var(--text2);
    max-width: 480px;
    line-height: 1.7;
    font-size: 1.05rem;
  }
  .welcome .steps {
    text-align: left;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px;
    max-width: 420px;
  }
  .welcome .steps ol {
    list-style: none;
    counter-reset: steps;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .welcome .steps ol li {
    counter-increment: steps;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 0.95rem;
    color: var(--text2);
  }
  .welcome .steps ol li::before {
    content: counter(steps);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    background: rgba(200,160,60,0.12);
    border: 1px solid var(--gold);
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Results */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .results-header h2 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold2);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .results-count {
    font-size: 0.85rem;
    color: var(--text3);
    font-style: italic;
  }

  /* Monster cards */
  .monster-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .monster-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .monster-card:hover { border-color: var(--border2); }

  .monster-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    gap: 12px;
    user-select: none;
  }
  .monster-header:hover { background: rgba(255,255,255,0.02); }

  .monster-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .monster-name {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: var(--gold3);
    font-weight: 600;
    flex: 1;
  }

  .monster-tc {
    font-size: 0.75rem;
    color: var(--text3);
    font-style: italic;
  }

  .monster-crystals-preview {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .crystal-pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .monster-expand {
    font-size: 0.7rem;
    color: var(--text3);
    transition: transform 0.2s;
    margin-left: 6px;
  }
  .monster-card.open .monster-expand { transform: rotate(180deg); }

  .monster-drops {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .monster-card.open .monster-drops { display: block; }

  .drop-group {
    margin-top: 12px;
  }
  .drop-group-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .ore-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 6px;
  }

  .ore-name {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    min-width: 90px;
    margin-top: 2px;
  }

  .ore-crystals {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex: 1;
  }

  .crystal-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 0.78rem;
    border: 1px solid;
  }
  .crystal-tag.primary {
    font-weight: 600;
  }
  .crystal-tag.secondary {
    opacity: 0.7;
  }

  .crystal-tag .qty {
    font-size: 0.65rem;
    opacity: 0.75;
    font-style: italic;
  }

  /* Crystal view */
  .crystal-view {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .crystal-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .crystal-section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .crystal-section-header .crystal-dot-lg {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }

  .crystal-section-header h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--gold3);
    font-weight: 600;
    flex: 1;
  }

  .crystal-section-body {
    padding: 12px 16px;
  }

  .monster-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .monster-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 0.82rem;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .monster-tag:hover {
    border-color: var(--gold);
    color: var(--gold3);
  }
  .monster-tag .primary-indicator {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  /* Ore view */
  .ore-view-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .ore-view-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold2);
  }
  .ore-view-body {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ore-view-crystals {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .ore-view-monsters {
    margin-top: 6px;
    font-size: 0.82rem;
    color: var(--text3);
  }
  .ore-view-monsters span {
    color: var(--text2);
  }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--text3);
    font-style: italic;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  .badge {
    background: rgba(200,160,60,0.15);
    border: 1px solid rgba(200,160,60,0.3);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    padding: 1px 6px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .tc-chain {
    font-size: 0.75rem;
    color: var(--text3);
    margin-top: 4px;
    font-style: italic;
  }
  .tc-chain span { color: var(--text2); }
</style>
<style>
/* === Area view styles === */
.area-view { display: flex; flex-direction: column; gap: 12px; }
.area-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.area-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; cursor: pointer;
  transition: background 0.15s;
}
.area-header:hover { background: rgba(255,255,255,0.02); }
.area-icon { font-size: 1.1rem; }
.area-name { flex: 1; font-family: 'Cinzel', serif; font-size: 0.9rem; color: var(--gold2); font-weight: 600; }
.area-ore-count { font-size: 0.75rem; color: var(--text3); margin-right: 8px; }
.area-expand { color: var(--text3); font-size: 0.7rem; transition: transform 0.2s; }
.area-card.open .area-expand { transform: rotate(180deg); }
.area-drops { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
.area-card.open .area-drops { display: block; }
.special-ore-badge {
  display: inline-block;
  font-size: 0.7rem;
  padding: 1px 6px;
  border-radius: 2px;
  background: var(--gold)20;
  border: 1px solid var(--gold)50;
  color: var(--gold2);
  margin-left: 6px;
  vertical-align: middle;
}
.area-monsters { margin-top: 10px; }
.area-monster-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.area-monster-tag {
  font-size: 0.72rem; color: var(--text2); padding: 2px 7px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer; transition: border-color 0.15s;
}
.area-monster-tag:hover { border-color: var(--border2); color: var(--text); }
.act-header {
  font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 600;
  color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase;
  padding: 18px 0 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
</style>
</head>
<body>

<div class="main-layout">
  <aside class="sidebar">
    <div>
      <header style="padding:20px 0 0;border:none;background:none;display:block">
        <h1 style="font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;color:var(--gold2);letter-spacing:0.08em">ESR Crystal Map</h1>
        <div style="font-size:0.78rem;color:var(--text3);font-style:italic;margin-top:4px">Eastern Sun Resurrected</div>
      </header>
    </div>

    <div>
      <div class="section-title">Search</div>
      <input class="search-box" id="search" type="text" placeholder="Monster, area, or crystal…" oninput="applyFilters()">
    </div>

    <div>
      <div class="section-title">View By</div>
      <div class="filter-tabs">
        <div class="filter-tab active" onclick="setView('monster')">Monster</div>
        <div class="filter-tab" onclick="setView('crystal')">Crystal</div>
        <div class="filter-tab" onclick="setView('ore')">Ore</div>
        <div class="filter-tab" onclick="setView('area')">Area</div>
      </div>
    </div>

    <div id="crystal-legend-section">
      <div class="section-title">Crystals <span style="float:right;cursor:pointer;color:var(--text3)" onclick="resetCrystalFilter()">reset</span></div>
      <div class="crystal-legend" id="crystal-legend"></div>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="welcome"><h2>⛏ Loading…</h2></div>
  </main>
</div>

<script>

// ============================================================
// STATE & CONSTANTS
// ============================================================
const CRYSTAL_COLORS = {
  'xtal-00': '#9a8fef',
  'xtal-01': '#8f8f8f',
  'xtal-02': '#ea8186',
  'xtal-03': '#ffffc0',
  'xtal-04': '#9991f4',
  'xtal-05': '#2d8838',
  'xtal-06': '#e5ddb6',
  'xtal-07': '#f17688',
  'xtal-08': '#60c067',
  'xtal-09': '#e0e0e0',
  'xtal-10': '#efc066',
  'xtal-11': '#b90efb'
};

const state = {
  crystalFilter: new Set(),
  view: 'monster',
  search: '',
};

// Derived lookups built from EMBEDDED data
let oreMap = {};      // ore name -> ore object {name, crystals}
let monsterMap = {};  // monster id -> {name, ores[]}
let areaList = [];      // [{name, monsters[], ores[]}]

// ============================================================
// INIT
// ============================================================
function init() {
  // Build lookups
  EMBEDDED.oreData.forEach(ore => oreMap[ore.name] = ore);

  Object.entries(EMBEDDED.monsterData).forEach(([id, mon]) => {
    monsterMap[id] = { id, name: mon.name, ores: mon.ores };
  });

  areaList = EMBEDDED.areaData.map(area => {
    const oreSet = new Set();
    area.monsters.forEach(mid => {
      (monsterMap[mid]?.ores || []).forEach(o => oreSet.add(o));
    });
    return { name: area.name, monsters: area.monsters, ores: [...oreSet] };
  });

  buildLegend();
  render();
}

// ============================================================
// CRYSTAL HELPERS
// ============================================================
function crystalName(id) {
  return EMBEDDED.crystalInfo[id]?.name || id;
}

function crystalColor(id) {
  return CRYSTAL_COLORS[id] || EMBEDDED.crystalInfo[id]?.color || '#888';
}

function crystalTagHTML(crystal) {
  const color = crystalColor(crystal.stat);
  const isPrimary = crystal.min > 1;
  const qty = isPrimary ? `${crystal.min}–${crystal.max}` : `0–${crystal.max}`;
  const cls = isPrimary ? 'primary' : 'secondary';
  return `<span class="crystal-tag ${cls}" style="background:${color}18;border-color:${color}50;color:${color}">
    <span class="crystal-dot" style="background:${color}"></span>
    ${crystalName(crystal.stat)}
    <span class="qty">${qty}</span>
  </span>`;
}

// ============================================================
// LEGEND
// ============================================================
function buildLegend() {
  const legend = document.getElementById('crystal-legend');
  legend.innerHTML = '';

  // Count monsters per crystal
  const crystalMonCount = {};
  Object.values(monsterMap).forEach(mon => {
    const seen = new Set();
    mon.ores.forEach(oreName => {
      const ore = oreMap[oreName];
      if (!ore) return;
      ore.crystals.forEach(c => {
        if (!seen.has(c.stat)) {
          seen.add(c.stat);
          crystalMonCount[c.stat] = (crystalMonCount[c.stat] || 0) + 1;
        }
      });
    });
  });

  Object.entries(EMBEDDED.crystalInfo).sort((a,b) => a[0].localeCompare(b[0])).forEach(([id, info]) => {
    const color = crystalColor(id);
    const active = state.crystalFilter.size === 0 || state.crystalFilter.has(id);
    const item = document.createElement('div');
    item.className = 'crystal-legend-item';
    item.style.opacity = active ? '1' : '0.35';
    item.innerHTML = `
      <div class="crystal-dot" style="background:${color};box-shadow:0 0 6px ${color}40"></div>
      <span class="crystal-name">${info.name}</span>
      <span class="crystal-count">${crystalMonCount[id] || 0}</span>
    `;
    item.onclick = () => toggleCrystalFilter(id);
    legend.appendChild(item);
  });
}

function toggleCrystalFilter(id) {
  if (state.crystalFilter.has(id)) state.crystalFilter.delete(id);
  else state.crystalFilter.add(id);
  buildLegend();
  render();
}

function resetCrystalFilter() {
  state.crystalFilter.clear();
  buildLegend();
  render();
}

// ============================================================
// VIEW & SEARCH
// ============================================================
function setView(v) {
  state.view = v;
  document.querySelectorAll('.filter-tab').forEach((t, i) => {
    t.classList.toggle('active', ['monster','crystal','ore','area'][i] === v);
  });
  render();
}

function applyFilters() {
  state.search = document.getElementById('search').value.toLowerCase().trim();
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const content = document.getElementById('content');
  if (state.view === 'monster') renderMonsterView(content);
  else if (state.view === 'crystal') renderCrystalView(content);
  else if (state.view === 'ore') renderOreView(content);
  else renderAreaView(content);
}

// ============================================================
// RELEVANCE SCORING
// Returns a score: number of filtered-crystal hits across all ores.
// Higher = more relevant. Used to sort results when filter is active.
// ============================================================
function monsterRelevanceScore(mon) {
  if (state.crystalFilter.size === 0) return 0;
  let score = 0;
  mon.ores.forEach(oreName => {
    const ore = oreMap[oreName];
    if (!ore) return;
    ore.crystals.forEach(c => {
      if (state.crystalFilter.has(c.stat)) {
        // Primary drops (min > 1) worth more than bonus drops
        score += c.min > 1 ? 3 : 1;
      }
    });
  });
  return score;
}

function oreRelevanceScore(ore) {
  if (state.crystalFilter.size === 0) return 0;
  let score = 0;
  ore.crystals.forEach(c => {
    if (state.crystalFilter.has(c.stat)) score += c.min > 1 ? 3 : 1;
  });
  return score;
}

function areaRelevanceScore(area) {
  if (state.crystalFilter.size === 0) return 0;
  let score = 0;
  area.ores.forEach(oreName => {
    const ore = oreMap[oreName];
    if (!ore) return;
    ore.crystals.forEach(c => {
      if (state.crystalFilter.has(c.stat)) score += c.min > 1 ? 3 : 1;
    });
  });
  return score;
}

// Helper: does a monster pass crystal filter?
function monsterPassesCrystalFilter(mon) {
  if (state.crystalFilter.size === 0) return true;
  for (const oreName of mon.ores) {
    const ore = oreMap[oreName];
    if (!ore) continue;
    for (const c of ore.crystals) {
      if (state.crystalFilter.has(c.stat)) return true;
    }
  }
  return false;
}

// ============================================================
// MONSTER VIEW
// ============================================================
function renderMonsterView(content) {
  const search = state.search;

  const filtered = Object.values(monsterMap).filter(mon => {
    if (search && !mon.name.toLowerCase().includes(search) && !mon.id.includes(search)) return false;
    return monsterPassesCrystalFilter(mon);
  }).sort((a, b) => {
    if (state.crystalFilter.size > 0) {
      const diff = monsterRelevanceScore(b) - monsterRelevanceScore(a);
      if (diff !== 0) return diff;
    }
    return a.name.localeCompare(b.name);
  });

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state">No monsters match your filters.</div>`;
    return;
  }

  let html = `<div class="results-header">
    <h2>Monster Drop Sources</h2>
    <span class="results-count">${filtered.length} monster${filtered.length !== 1 ? 's' : ''}</span>
  </div><div class="monster-grid">`;

  filtered.forEach(mon => {
    const allCrystalIds = [...new Set(mon.ores.flatMap(oreName => (oreMap[oreName]?.crystals || []).map(c => c.stat)))];
    const pips = allCrystalIds.slice(0,8).map(cid => {
      const color = crystalColor(cid);
      return `<span class="crystal-pip" style="background:${color};box-shadow:0 0 4px ${color}60"></span>`;
    }).join('');

    const oreRows = mon.ores.map(oreName => {
      const ore = oreMap[oreName];
      if (!ore) return '';
      const tags = ore.crystals.map(c => crystalTagHTML(c)).join('');
      return `<div class="ore-row">
        <div class="ore-name">${ore.name}</div>
        <div class="ore-crystals">${tags}</div>
      </div>`;
    }).join('');

    html += `<div class="monster-card" id="mc-${mon.id}">
      <div class="monster-header" onclick="toggleCard('mc-${mon.id}')">
        <span class="monster-icon">💀</span>
        <div style="flex:1">
          <div class="monster-name">${mon.name}</div>
          <div class="monster-tc">${mon.id}</div>
        </div>
        <div class="monster-crystals-preview">${pips}</div>
        <span class="monster-expand">▼</span>
      </div>
      <div class="monster-drops">
        <div class="drop-group">
          <div class="drop-group-title">Ore Drops (${mon.ores.length})</div>
          ${oreRows}
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  content.innerHTML = html;
}

// ============================================================
// CRYSTAL VIEW
// ============================================================
function renderCrystalView(content) {
  const search = state.search;

  // Build crystal -> monsters list
  const crystalMonsters = {};
  Object.values(monsterMap).forEach(mon => {
    mon.ores.forEach(oreName => {
      const ore = oreMap[oreName];
      if (!ore) return;
      ore.crystals.forEach(crystal => {
        const cid = crystal.stat;
        if (!crystalMonsters[cid]) crystalMonsters[cid] = [];
        if (!crystalMonsters[cid].find(e => e.mon.id === mon.id && e.ore.name === ore.name)) {
          crystalMonsters[cid].push({ mon, ore, crystal });
        }
      });
    });
  });

  const allCrystals = Object.keys(EMBEDDED.crystalInfo).sort();
  const filtered = allCrystals.filter(cid => {
    const name = crystalName(cid).toLowerCase();
    if (search && !cid.includes(search) && !name.includes(search)) {
      const hasMonster = (crystalMonsters[cid] || []).some(e => e.mon.name.toLowerCase().includes(search));
      if (!hasMonster) return false;
    }
    if (state.crystalFilter.size > 0 && !state.crystalFilter.has(cid)) return false;
    return true;
  }).sort((a, b) => {
    // Sort by number of monster sources descending
    const diff = (crystalMonsters[b] || []).length - (crystalMonsters[a] || []).length;
    if (diff !== 0) return diff;
    return crystalName(a).localeCompare(crystalName(b));
  });

  let html = `<div class="results-header">
    <h2>Crystal Sources</h2>
    <span class="results-count">${filtered.length} type${filtered.length !== 1 ? 's' : ''}</span>
  </div><div class="crystal-view">`;

  filtered.forEach(cid => {
    const color = crystalColor(cid);
    const name = crystalName(cid);
    const entries = crystalMonsters[cid] || [];
    const primary = entries.filter(e => e.crystal.min > 1);
    const secondary = entries.filter(e => e.crystal.min <= 1);

    const monTags = (arr, isPrimary) => arr.map(e => {
      const qty = e.crystal.min > 1 ? `${e.crystal.min}–${e.crystal.max}` : `0–${e.crystal.max}`;
      return `<div class="monster-tag" onclick="switchToMonster('${e.mon.id}')">
        ${isPrimary ? `<span class="primary-indicator"></span>` : ''}
        ${e.mon.name} <span style="color:var(--text3);font-size:0.72rem">(${e.ore.name}, ×${qty})</span>
      </div>`;
    }).join('');

    html += `<div class="crystal-section">
      <div class="crystal-section-header">
        <div class="crystal-dot-lg" style="background:${color}"></div>
        <h3>${name} <span style="font-size:0.65rem;color:var(--text3);font-weight:400">${cid}</span></h3>
        <span class="badge">${entries.length} source${entries.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="crystal-section-body">
        ${primary.length > 0 ? `<div class="drop-group-title" style="margin-bottom:8px">Primary Drop (guaranteed 2–4)</div>
          <div class="monster-list">${monTags(primary, true)}</div>` : ''}
        ${secondary.length > 0 ? `<div class="drop-group-title" style="margin:12px 0 8px">Bonus Drop (0–1 chance)</div>
          <div class="monster-list">${monTags(secondary, false)}</div>` : ''}
      </div>
    </div>`;
  });

  html += `</div>`;
  content.innerHTML = html;
}

// ============================================================
// ORE VIEW
// ============================================================
function renderOreView(content) {
  const search = state.search;
  const cFilter = state.crystalFilter;

  // Build ore -> monsters
  const oreMonsters = {};
  Object.values(monsterMap).forEach(mon => {
    mon.ores.forEach(oreName => {
      if (!oreMonsters[oreName]) oreMonsters[oreName] = [];
      oreMonsters[oreName].push(mon.name);
    });
  });

  const filtered = EMBEDDED.oreData.filter(ore => {
    if (search && !ore.name.toLowerCase().includes(search)) return false;
    if (cFilter.size > 0) {
      if (!ore.crystals.some(c => cFilter.has(c.stat))) return false;
    }
    return true;
  }).sort((a, b) => {
    if (cFilter.size > 0) {
      const diff = oreRelevanceScore(b) - oreRelevanceScore(a);
      if (diff !== 0) return diff;
    }
    return a.name.localeCompare(b.name);
  });

  let html = `<div class="results-header">
    <h2>Ore Contents</h2>
    <span class="results-count">${filtered.length} ore type${filtered.length !== 1 ? 's' : ''}</span>
  </div>`;

  filtered.forEach(ore => {
    const tags = ore.crystals.map(c => crystalTagHTML(c)).join('');
    const monsters = oreMonsters[ore.name] || [];
    const monStr = monsters.length > 0
      ? monsters.slice(0,6).join(', ') + (monsters.length > 6 ? ` +${monsters.length-6} more` : '')
      : 'No monster sources found';

    html += `<div class="ore-view-card">
      <div class="ore-view-header">${ore.name}</div>
      <div class="ore-view-body">
        <div class="ore-view-crystals">${tags}</div>
        <div class="ore-view-monsters">Dropped by: <span>${monStr}</span></div>
      </div>
    </div>`;
  });

  content.innerHTML = html;
}

// ============================================================
// AREA VIEW
// ============================================================
// Ore 0-11 are "special" (4 crystals each, different combos per ore)
// Ores 12-15 are "common" (6 crystals each, always present)
const COMMON_ORES = new Set(['Uni Ore 12', 'Uni Ore 13', 'Uni Ore 14', 'Uni Ore 15']);

function renderAreaView(content) {
  const search = state.search;
  const cFilter = state.crystalFilter;

  const filtered = areaList.filter(area => {
    if (search && !area.name.toLowerCase().includes(search)) {
      // also check monster names
      const hasMonster = area.monsters.some(mid => {
        const mon = monsterMap[mid];
        return mon && mon.name.toLowerCase().includes(search);
      });
      if (!hasMonster) return false;
    }
    if (cFilter.size > 0) {
      // Area must have an ore containing the filtered crystal
      let found = false;
      for (const oreName of area.ores) {
        const ore = oreMap[oreName];
        if (ore && ore.crystals.some(c => cFilter.has(c.stat))) { found = true; break; }
      }
      if (!found) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state">No areas match your filters.</div>`;
    return;
  }

  // Sort: by relevance score when filter active, else special-ores-first then alphabetical
  filtered.sort((a, b) => {
    if (state.crystalFilter.size > 0) {
      const diff = areaRelevanceScore(b) - areaRelevanceScore(a);
      if (diff !== 0) return diff;
    } else {
      const aSpecial = a.ores.filter(o => !COMMON_ORES.has(o)).length;
      const bSpecial = b.ores.filter(o => !COMMON_ORES.has(o)).length;
      if (bSpecial !== aSpecial) return bSpecial - aSpecial;
    }
    return a.name.localeCompare(b.name);
  });

  let html = `<div class="results-header">
    <h2>Areas</h2>
    <span class="results-count">${filtered.length} area${filtered.length !== 1 ? 's' : ''}</span>
  </div><div class="area-view">`;

  // Group by whether they have special ores (only used when no filter active)
  const withSpecial = filtered.filter(a => a.ores.some(o => !COMMON_ORES.has(o)));
  const commonOnly  = filtered.filter(a => !a.ores.some(o => !COMMON_ORES.has(o)));

  function renderArea(area) {
    const specialOres = area.ores.filter(o => !COMMON_ORES.has(o)).sort();
    const commonOres  = area.ores.filter(o => COMMON_ORES.has(o));

    // Crystal pips — put filter matches first when filter is active
    let areaCrystalIds = [...new Set(area.ores.flatMap(oreName => (oreMap[oreName]?.crystals || []).map(c => c.stat)))];
    if (state.crystalFilter.size > 0) {
      areaCrystalIds.sort((a, b) => (state.crystalFilter.has(b)?1:0) - (state.crystalFilter.has(a)?1:0));
    }
    const pips = areaCrystalIds.slice(0, 12).map(cid => {
      const color = crystalColor(cid);
      const highlight = state.crystalFilter.size > 0 && state.crystalFilter.has(cid);
      return `<span class="crystal-pip" style="background:${color};box-shadow:0 0 4px ${color}60;${highlight?'outline:1px solid '+color+';transform:scale(1.35)':'opacity:0.4'}"></span>`;
    }).join('');

    const specialBadges = specialOres.map(o => `<span class="special-ore-badge">${o}</span>`).join('');

    // Ore rows — relevant ores sorted first when filter active
    let oreOrder = [...specialOres, ...commonOres];
    if (state.crystalFilter.size > 0) {
      oreOrder.sort((a, b) =>
        oreRelevanceScore(oreMap[b]||{crystals:[]}) - oreRelevanceScore(oreMap[a]||{crystals:[]})
      );
    }
    const oreRows = oreOrder.map(oreName => {
      const ore = oreMap[oreName];
      if (!ore) return '';
      const isSpecial  = !COMMON_ORES.has(oreName);
      const isRelevant = state.crystalFilter.size > 0 && ore.crystals.some(c => state.crystalFilter.has(c.stat));
      const tags = ore.crystals.map(c => crystalTagHTML(c)).join('');
      return `<div class="ore-row" style="${isSpecial?'background:rgba(200,160,60,0.04);border-left:2px solid var(--gold)40;padding-left:8px;':''}${isRelevant?'background:rgba(255,255,255,0.025);':'opacity:0.5;'}">
        <div class="ore-name" style="${isSpecial?'color:var(--gold2)':''}">${ore.name}${isSpecial?' ★':''}</div>
        <div class="ore-crystals">${tags}</div>
      </div>`;
    }).join('');

    // Monsters in area
    const monTags = area.monsters.map(mid => {
      const mon = monsterMap[mid];
      if (!mon) return '';
      return `<span class="area-monster-tag" onclick="switchToMonster('${mid}')">${mon.name}</span>`;
    }).join('');

    return `<div class="area-card" id="ac-${area.name.replace(/[^a-z0-9]/gi,'_')}">
      <div class="area-header" onclick="toggleAreaCard(this)">
        <span class="area-icon">🗺</span>
        <div style="flex:1">
          <div class="area-name">${area.name}${specialBadges}</div>
        </div>
        <div class="monster-crystals-preview">${pips}</div>
        <span class="area-expand">▼</span>
      </div>
      <div class="area-drops">
        <div class="drop-group">
          <div class="drop-group-title">Ores (${area.ores.length})</div>
          ${oreRows}
        </div>
        <div class="area-monsters">
          <div class="drop-group-title">Monsters (${area.monsters.length})</div>
          <div class="area-monster-list">${monTags}</div>
        </div>
      </div>
    </div>`;
  }

  if (state.crystalFilter.size > 0) {
    // Filter active: flat relevance-sorted list, no section grouping
    filtered.forEach(area => html += renderArea(area));
  } else {
    if (withSpecial.length > 0) {
      html += `<div class="act-header">Areas with special ores (${withSpecial.length})</div>`;
      withSpecial.forEach(area => html += renderArea(area));
    }
    if (commonOnly.length > 0) {
      html += `<div class="act-header" style="margin-top:16px">Standard areas (${commonOnly.length})</div>`;
      commonOnly.forEach(area => html += renderArea(area));
    }
  }

  html += `</div>`;
  content.innerHTML = html;
}

// ============================================================
// UI HELPERS
// ============================================================
function toggleCard(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function toggleAreaCard(header) {
  header.closest('.area-card').classList.toggle('open');
}

function switchToMonster(monsterId) {
  state.view = 'monster';
  state.search = monsterId;
  document.getElementById('search').value = monsterId;
  document.querySelectorAll('.filter-tab').forEach((t,i) => {
    t.classList.toggle('active', i === 0);
  });
  render();
}

// Init on load
init();
</script>
</body>
</html>
